<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FuseSimple — King County Parcels</title>

    <!--
      FuseSimple King County Parcels Demo
      ====================================
      Demonstrates FuseSimple fusing a PMTiles basemap (MapLibre) with an
      Esri MapView. Two independent parcel layers prove pixel-perfect
      alignment between the engines:

        1. Red outlines   — GeoJSON rendered by MapLibre on the basemap
        2. Shaded polygons — Esri FeatureLayer from ArcGIS Online

      Both trace the same King County parcel boundaries. Toggle each
      layer independently to compare.

      Stack:
        - Esri Maps SDK 5.0 (web components, loaded from CDN)
        - FuseSimple standalone bundle (includes MapLibre + PMTiles)
        - PMTiles basemap hosted on tiles.mapsimple.org

      PMTiles archive: king_county.pmtiles (~104 MB)
        - Bounds: -122.55, 47.06 -> -121.06, 47.79 (King County, WA)
        - Zoom: 0-15
        - Center: (-121.805, 47.425), Snoqualmie area
        - ~17.9K addressed tiles, ~17.6K unique tiles
        - Built with Planetiler from OSM replication (Apr 2026)
        - Smallest of the three demo archives; tight county-scale bounds

      No build tools required. This is a single HTML file.
    -->

    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <!-- Esri Maps SDK 5.0 — loaded as ES modules via CDN -->
    <script type="module" src="https://js.arcgis.com/5.0/"></script>

    <!--
      Start fetching the FuseSimple bundle immediately, in parallel with
      the Esri SDK, instead of waiting until the <script type="module">
      down in <body> is reached. The bundle is ~1.5 MB minified; on a
      cold CDN edge or slow connection, saving those milliseconds means
      the user isn't staring at the bare Esri basemap waiting for
      FuseSimple's splash to come up.

      modulepreload (not preload as="script") is the right directive for
      ES modules — it hints to the browser that the target is a module
      and preserves module parse caching.
    -->
    <link rel="modulepreload" href="https://fusesimple.mapsimple.org/dist/fusesimple.min.js?v=0.14.1" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      body { font-family: "Avenir Next", "Helvetica Neue", sans-serif; }

      /* Map fills the full viewport. 100dvh accounts for mobile browser chrome. */
      arcgis-map {
        display: block;
        width: 100%;
        height: 100dvh;
      }

      /* ---- Layer panel (custom, outside Esri UI) ---- */

      /* Toggle button — sits in top-right corner */
      #layerBtn {
        position: absolute;
        top: 15px;
        right: 15px;
        z-index: 50;
        width: 32px;
        height: 32px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-shadow: 0 1px 4px rgba(0,0,0,.3);
        cursor: pointer;
        font-size: 16px;
        line-height: 30px;
        text-align: center;
        -webkit-tap-highlight-color: transparent;
      }

      /* Panel — anchored to the left of the toggle button */
      #layerPanel {
        display: block;
        position: absolute;
        top: 15px;
        right: 55px;
        z-index: 50;
        background: white;
        padding: 10px 14px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,.25);
        font-size: 13px;
        width: 250px;
      }

      /* Toggled closed via JS .classList.toggle("closed") */
      #layerPanel.closed { display: none; }

      #layerPanel h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        font-weight: 600;
      }

      #layerPanel label {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 4px 0;
        -webkit-tap-highlight-color: transparent;
      }

      #layerPanel input[type="checkbox"] {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        cursor: pointer;
      }

      #layerPanel .desc {
        font-size: 11px;
        color: #666;
        margin-top: 8px;
        line-height: 1.4;
      }

      /* ---- Title bar ---- */
      #titleBar {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        background: white;
        padding: 10px 14px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,.25);
        pointer-events: none;
        text-align: center;
      }
      #titleBar h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.3;
      }
      #titleBar h2 {
        margin: 0;
        font-size: 12px;
        font-weight: 400;
        color: #555;
        line-height: 1.3;
      }

      /* Mobile adjustments — tighter positioning, larger tap targets */
      @media (max-width: 600px) {
        #titleBar { top: 10px; }
        #layerBtn { top: 10px; right: 10px; }
        #layerPanel {
          top: 10px;
          right: 50px;
          width: 250px;
        }
        #layerPanel input[type="checkbox"] {
          width: 22px;
          height: 22px;
        }
      }
    </style>
  </head>
  <body>

    <!--
      arcgis-map: Esri 5.0 web component.
      - basemap="gray-vector" is a throwaway — the <arcgis-map> web
        component won't initialize without one. FuseSimple strips it and
        makes the view transparent so PMTiles shows through.
      - arcgis-popup is required in the markup for view.openPopup() to work.
    -->
    <arcgis-map basemap="gray-vector" center="-122.33, 47.6" zoom="13">
      <arcgis-zoom slot="top-left"></arcgis-zoom>
      <arcgis-home slot="top-left"></arcgis-home>
      <arcgis-popup slot="popup"></arcgis-popup>
    </arcgis-map>

    <!-- Title bar — identifies the demo. pointer-events:none so it
         doesn't block map interaction underneath. -->
    <div id="titleBar">
      <h1>Dual Source Parcels Demo</h1>
      <h2>King County Parcels</h2>
    </div>

    <!-- Layer panel — positioned outside Esri's UI system to avoid
         conflicts with popups and mobile docking behavior. -->
    <button id="layerBtn" title="Layers">&#9776;</button>

    <div id="layerPanel">
      <h3>Layers</h3>
      <label>
        <input type="checkbox" id="esriParcelsToggle" checked />
        Parcels (Esri FeatureLayer)
      </label>
      <label>
        <input type="checkbox" id="mlParcelsToggle" checked />
        Parcels (MapLibre overlay)
      </label>
      <p class="desc">
        Both parcel layers trace the same boundaries. The red outlines are
        rendered by MapLibre on the basemap; the shaded polygons are an Esri
        FeatureLayer on top. Zoom in to see pixel-perfect alignment.
      </p>
    </div>

    <script type="module">
      // ----------------------------------------------------------------
      // FuseSimple CDN bundle — includes MapLibre GL JS + PMTiles.
      // The consumer only imports FuseSimple; the internal engines are
      // never exposed. Version-pinned so cache busts on upgrades.
      // ----------------------------------------------------------------
      import { FuseSimple } from "https://fusesimple.mapsimple.org/dist/fusesimple.min.js?v=0.14.1";

      // Hosts: tile archives live on tiles.mapsimple.org;
      // styles, library, and demo data live on fusesimple.mapsimple.org.
      var TILES = "https://tiles.mapsimple.org";
      var FUSESIMPLE = "https://fusesimple.mapsimple.org";

      // Layer panel toggle — open by default, hamburger button hides it.
      document.getElementById("layerBtn").addEventListener("click", function () {
        document.getElementById("layerPanel").classList.toggle("closed");
      });

      // ----------------------------------------------------------------
      // FuseSimple handles <arcgis-map> readiness internally as of 0.14.1 —
      // pass the element directly and FuseSimple awaits viewOnReady() for
      // us. No addEventListener("arcgisViewReadyChange") needed; avoids a
      // real listener race on cache-warm loads where the event can fire
      // before the listener attaches.
      // ----------------------------------------------------------------
      var mapEl = document.querySelector("arcgis-map");

      (async () => {
        // ---- Build the parcels FeatureLayer (no view needed yet) ----
        // Standard Esri workflow — a hosted feature service with a
        // popupTemplate. We construct it here but don't add it to the
        // map until after FuseSimple.create() resolves and the view is
        // available.
        var FeatureLayer = await $arcgis.import("esri/layers/FeatureLayer");
        var parcels = new FeatureLayer({
          url: "https://services.arcgis.com/Ej0PsM5Aw677QF1W/arcgis/rest/services/PARCEL_ADDRESS_PUB_AREA_3069/FeatureServer/0",
          opacity: 0.5,
          minScale: 18000,
          popupTemplate: {
            title: "Parcel {PIN}",
            content: [
              {
                type: "fields",
                fieldInfos: [
                  { fieldName: "ADDR_FULL", label: "Address" },
                  { fieldName: "CTYNAME", label: "City" },
                  { fieldName: "ZIP5", label: "ZIP" },
                  { fieldName: "KCTP_STATE", label: "State" },
                  { fieldName: "PLAT_NAME", label: "Plat" },
                  { fieldName: "PLAT_LOT", label: "Lot" }
                ]
              }
            ]
          }
        });

        // ---- Basemap style: Protomaps Light + GeoJSON test parcels ----
        // Fetch the pre-built Protomaps Light style, then:
        //   1. Repoint the PMTiles source URL to the hosted tiles
        //   2. Add a GeoJSON source with the same parcel boundaries
        //      rendered as red outlines — this is the alignment proof
        var res = await fetch(FUSESIMPLE + "/assets/json/protomaps-light-full.json");
        var style = await res.json();

        // Repoint the tile source from the local path to the hosted URL.
        // The style was built with a local "pmtiles:///king_county.pmtiles"
        // reference; we override it here for remote hosting.
        style.sources.protomaps.url = "pmtiles://" + TILES + "/king_county.pmtiles";

        // Add the same parcel boundaries as a GeoJSON layer on MapLibre.
        // Red outlines + subtle fill make alignment easy to verify visually.
        style.sources["test-parcels"] = {
          type: "geojson",
          data: FUSESIMPLE + "/assets/data/test-parcels.geojson"
        };
        style.layers.push({
          id: "test-parcels-fill",
          type: "fill",
          source: "test-parcels",
          paint: { "fill-color": "#ff0000", "fill-opacity": 0.08 }
        });
        style.layers.push({
          id: "test-parcels-outline",
          type: "line",
          source: "test-parcels",
          paint: { "line-color": "#ff0000", "line-width": 2 }
        });

        // ---- FuseSimple.create() ----
        // Pass the <arcgis-map> element directly — FuseSimple awaits its
        // viewOnReady() internally and resolves once the view is fully
        // initialized. From here:
        //   1. Reads the PMTiles header to get bounds, center, zoom range
        //   2. Computes Esri-compatible LODs from the header
        //   3. Makes the Esri view transparent so MapLibre shows through
        //   4. Mounts a hidden MapLibre instance behind the Esri canvas
        //   5. Syncs Esri view state (center, zoom, rotation) to MapLibre
        //   6. Wires click/hover passthrough from Esri to MapLibre
        //   7. Injects OSM + FuseSimple attribution into the Esri bar
        var fuse = await FuseSimple.create({
          basemap: {
            engine: "maplibre",
            source: TILES + "/king_county.pmtiles",
            style: style
          },
          operational: {
            engine: "esri",
            view: mapEl
          }
        });

        // With FuseSimple mounted, mapEl.view is ready to use. Grab it
        // for the layer add + popup calls below.
        var view = mapEl.view;
        view.map.add(parcels);

        // ---- Layer toggles ----
        // Esri layer visibility is controlled directly on the FeatureLayer.
        // MapLibre layer visibility goes through FuseSimple's API — the
        // consumer never touches the MapLibre instance directly.
        document.getElementById("esriParcelsToggle").addEventListener("change", function (e) {
          parcels.visible = e.target.checked;
        });

        document.getElementById("mlParcelsToggle").addEventListener("change", function (e) {
          fuse.setBasemapLayerVisibility("test-parcels-fill", e.target.checked);
          fuse.setBasemapLayerVisibility("test-parcels-outline", e.target.checked);
        });

        // ---- Basemap click passthrough ----
        // When Esri's hit test misses a feature, FuseSimple queries
        // MapLibre's rendered features at the click point and fires a
        // "basemap-click" event. We use this to show an Esri popup for
        // features that live on the basemap (MapLibre) side.
        //
        // view.openPopup() is the Esri 5.0 web component API for
        // programmatic popups. It requires an Esri Point for the location
        // and <arcgis-popup slot="popup"> in the markup.
        var Point = await $arcgis.import("esri/geometry/Point");

        fuse.on("basemap-click", function (e) {
          // Find a test parcel feature among the clicked basemap features.
          var parcel = e.features.find(function (f) {
            return f.layer === "test-parcels-fill" || f.layer === "test-parcels-outline";
          });
          if (!parcel) return;

          var addr = parcel.properties.ADDR_FULL || "No address";
          var city = parcel.properties.CTYNAME || "";

          // Open the Esri popup at the click location with basemap data.
          // This shows that data from both engines can surface through
          // the same popup system.
          view.openPopup({
            title: "Basemap Parcel",
            content:
              "<b>Address:</b> " + addr +
              (city ? "<br><b>City:</b> " + city : "") + "<div style='height: 8px;'></div>",
            location: new Point({
              longitude: e.lngLat.lng,
              latitude: e.lngLat.lat
            })
          });
        });
      })();
    </script>
  </body>
</html>
